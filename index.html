<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Estilista IA - Panel</title>
  <style>
    :root {
      --primary: #4a90e2;
      --bg: #f0f2f5;
      --card: #ffffff;
      --dark: #2c3e50;
      --success: #27ae60;
      --overlay: rgba(0, 0, 0, 0.7);
    }

    body {
      font-family: "Segoe UI", sans-serif;
      background: var(--bg);
      margin: 0;
      padding: 20px;
    }

    /* Contenedor Principal */
    .dashboard {
      max-width: 800px;
      margin: 0 auto;
      text-align: center;
    }

    .btn-principal {
      padding: 15px 30px;
      border-radius: 50px;
      border: none;
      background: var(--primary);
      color: white;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(74, 144, 226, 0.3);
      margin: 10px;
      transition: transform 0.2s;
    }

    .btn-principal:hover {
      transform: scale(1.05);
    }

    /* Modal */
    #modal-carga {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--overlay);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(5px);
    }

    .modal-contenido {
      background: white;
      padding: 30px;
      border-radius: 20px;
      width: 90%;
      max-width: 450px;
      position: relative;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
    }

    /* Zona de Carga */
    .zona-drop {
      border: 2px dashed #ddd;
      padding: 30px;
      text-align: center;
      border-radius: 15px;
      margin-bottom: 20px;
      cursor: pointer;
      background: #fdfdfd;
      position: relative;
      overflow: hidden;
    }

    .zona-drop:hover {
      border-color: var(--primary);
      background: #f0f7ff;
    }

    #img-preview {
      width: 100%;
      max-height: 200px;
      object-fit: contain;
      display: none;
      margin-bottom: 10px;
      border-radius: 10px;
    }

    /* Formulario */
    .grid-campos {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      text-align: left;
    }

    label {
      font-size: 11px;
      font-weight: bold;
      color: #888;
      text-transform: uppercase;
    }

    select {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ddd;
      margin-top: 5px;
    }

    .btn-confirmar {
      width: 100%;
      padding: 15px;
      border-radius: 12px;
      border: none;
      background: var(--success);
      color: white;
      font-weight: bold;
      cursor: pointer;
      margin-top: 20px;
      font-size: 16px;
    }

    .btn-cerrar {
      position: absolute;
      top: 15px;
      right: 15px;
      background: #eee;
      border: none;
      width: 30px;
      height: 30px;
      border-radius: 50%;
      cursor: pointer;
      font-weight: bold;
    }

    #status-modal {
      font-size: 13px;
      margin-top: 10px;
      color: var(--primary);
      font-weight: 500;
    }

    .contenedor-outfit {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      margin-top: 40px;
    }

    .tarjeta-prenda {
      background: white;
      padding: 10px;
      border-radius: 15px;
      width: 180px;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
    }

    .img-outfit {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 10px;
    }

    .contenedor-botones {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    /* El fondo que bloquea la pantalla */
    .modal-error-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      z-index: 3000;
      align-items: center;
      justify-content: center;
    }

    /* La caja del mensaje */
    .modal-error-caja {
      background: white;
      padding: 25px;
      border-radius: 15px;
      width: 90%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      border-top: 5px solid #e74c3c;
      /* Un borde rojo para errores */
    }

    .modal-error-caja p {
      color: #333;
      font-size: 16px;
      margin-bottom: 20px;
      line-height: 1.5;
    }
  </style>
</head>

<body>
  <div id="pantalla-auth"
    style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 2000; display: flex; align-items: center; justify-content: center;">
    <div class="modal-contenido" style="text-align: center;">
      <h2 style="color: var(--dark);">👤 Mi Estilista IA</h2>
      <p style="color: #666; font-size: 14px;">Accede a tu armario personal</p>

      <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 20px;">
        <input type="text" id="auth-user" placeholder="Usuario"
          style="padding: 12px; border-radius: 8px; border: 1px solid #ddd;">

        <input type="password" id="auth-pass" placeholder="Contraseña" onblur="validarCoincidencia()"
          style="padding: 12px; border-radius: 8px; border: 1px solid #ddd;">

        <input type="password" id="auth-pass-confirm" placeholder="Confirmar contraseña" onblur="validarCoincidencia()"
          style="padding: 12px; border-radius: 8px; border: 1px solid #ddd; display: none;">

        <span id="error-pass" style="color: red; font-size: 11px; display: none;">Las contraseñas no coinciden</span>
      </div>

      <div class="contenedor-botones">
        <button id="btn-login-ui" class="btn-principal" style="flex: 1; margin: 0;"
          onclick="gestionarAuth('login')">Entrar</button>
        <button id="btn-reg-ui" class="btn-principal" style="flex: 1; margin: 0; background: var(--dark);"
          onclick="gestionarAuth('registro')">Registrarse</button>
      </div>
      <p id="auth-status" style="margin-top: 15px; font-size: 13px; min-height: 18px;"></p>
    </div>
  </div>

  <div class="dashboard">
    <h1>🧥 Mi Estilista IA</h1>
    <button class="btn-principal" onclick="abrirModal()">📸 Añadir Prenda</button>
    <button class="btn-principal" style="background: var(--dark)" onclick="generarOutfit()">✨ Sugerir Outfit</button>
    <div class="contenedor-outfit" id="outfit-resultado"></div>
  </div>

  <div id="modal-carga">
    <div class="modal-contenido">
      <button class="btn-cerrar" onclick="cerrarModal()">✕</button>
      <h2 style="margin-top: 0">Nueva Prenda</h2>

      <div class="zona-drop" onclick="document.getElementById('file-input').click()">
        <img id="img-preview" />
        <p id="texto-drop">Haz clic o arrastra una imagen</p>
        <input type="file" id="file-input" hidden accept="image/*" />
      </div>

      <div class="grid-campos">
        <div>
          <label>Tipo de Prenda</label>
          <select id="combo-tipo" disabled>
            <option value="" disabled selected>Esperando prenda...</option>
            <option value="Camiseta">Camiseta</option>
            <option value="Sudadera">Sudadera</option>
            <option value="Pantalón">Pantalón</option>
            <option value="Chaqueta">Chaqueta</option>
            <option value="Vaquero">Vaquero</option>
            <option value="Falda">Falda</option>
            <option value="Calzado">Calzado</option>
          </select>
        </div>
        <div>
          <label>Color Principal</label>
          <select id="combo-color" disabled>
            <option value="" disabled selected>Esperando prenda...</option>
            <option value="Blanco">Blanco</option>
            <option value="Negro">Negro</option>
            <option value="Azul">Azul</option>
            <option value="Gris">Gris</option>
            <option value="Rojo">Rojo</option>
            <option value="Beige/Amarillo">Beige/Amarillo</option>
          </select>
        </div>
        <div style="grid-column: span 2">
          <label>Estilo de la Prenda</label>
          <select id="combo-estilo" disabled>
            <option value="" disabled selected>Esperando prenda...</option>
            <option value="Casual">Casual</option>
            <option value="Formal">Formal</option>
            <option value="Deportivo">Deportivo</option>
          </select>
        </div>
      </div>

      <p id="status-modal"></p>
      <button class="btn-confirmar" id="btn-guardar" onclick="enviarGuardadoFinal()">
        💾 Guardar en el Armario
      </button>
      <div id="modal-dinamico" class="modal-error-overlay">
        <div class="modal-error-caja">
          <p id="texto-error-dinamico"></p>
          <button class="btn-principal" onclick="cerrarError()">Aceptar</button>
        </div>
      </div>

      <script>
        const API_URL = "http://192.168.0.101:8000";
        let nombreArchivoTemp = "";
        let SESION = { id: null, nombre: "" };

        // --- AUTENTICACIÓN ---

        function validarCoincidencia() {
          const pass = document.getElementById('auth-pass');
          const confirm = document.getElementById('auth-pass-confirm');
          const errorMsg = document.getElementById('error-pass');

          if (confirm.style.display !== 'none' && confirm.value !== "") {
            if (pass.value !== confirm.value) {
              errorMsg.style.display = 'block';
              confirm.style.borderColor = 'red';
              return false;
            } else {
              errorMsg.style.display = 'none';
              confirm.style.borderColor = 'var(--success)';
              return true;
            }
          }
          return true;
        }

        async function gestionarAuth(tipo) {
          const user = document.getElementById('auth-user').value;
          const pass = document.getElementById('auth-pass').value;
          const confirm = document.getElementById('auth-pass-confirm').value;

          const campoConfirm = document.getElementById('auth-pass-confirm');
          const btnLogin = document.getElementById('btn-login-ui');
          const btnReg = document.getElementById('btn-reg-ui');
          const status = document.getElementById('auth-status');

          // --- LÓGICA DE TRANSFORMACIÓN PARA REGISTRO ---
          if (tipo === 'registro') {
            // Si el campo de confirmación está oculto, transformamos la interfaz
            if (campoConfirm.style.display === 'none') {
              campoConfirm.style.display = 'block'; // Muestra confirmación
              btnLogin.style.display = 'none';      // Desaparece botón Entrar
              btnReg.style.flex = 'none';           // Quita el crecimiento flexible
              btnReg.style.width = '100%';          // Lo hace ancho completo (centrado)

              status.innerText = "✍️ Crea tu cuenta confirmando la contraseña";
              status.style.color = "orange";
              return; // Salimos para que el usuario complete los datos
            }

            // Si ya es visible, validamos antes de enviar
            if (!validarCoincidencia()) {
              status.innerText = "⚠️ Las contraseñas deben ser iguales";
              return;
            }
          }

          // --- VALIDACIÓN DE CAMPOS VACÍOS ---
          if (!user || !pass || (tipo === 'registro' && !confirm)) {
            status.innerText = "⚠️ Rellena todos los campos";
            status.style.color = "red";
            return;
          }

          // --- ENVÍO AL SERVIDOR ---
          const formData = new FormData();
          formData.append('usuario', user);
          formData.append('password', pass);

          try {
            const res = await fetch(`${API_URL}/${tipo}`, { method: 'POST', body: formData });
            const data = await res.json();

            if (res.ok) {
              if (tipo === 'login') {
                SESION = { id: data.id, nombre: data.nombre };
                document.getElementById('pantalla-auth').style.display = 'none';
                // Aquí podrías llamar a cargarArmarioUsuario() si lo tienes
              } else {
                status.innerText = "✅ ¡Usuario registrado! Ahora puedes entrar.";
                status.style.color = "green";

                // Opcional: Revertir interfaz para que el usuario pueda hacer login
                setTimeout(() => {
                  campoConfirm.style.display = 'none';
                  btnLogin.style.display = 'block';
                  btnReg.style.width = 'auto';
                  btnReg.style.flex = '1';
                }, 2000);
              }
            } else {
              status.innerText = "❌ " + (data.detail || "Error de acceso");
              status.style.color = "red";
            }
          } catch (err) {
            status.innerText = "🌐 Error de conexión con el PC";
          }
        }

        // --- ARMARIO Y PRENDAS ---

        function abrirModal() {
          document.getElementById("modal-carga").style.display = "flex";
        }

        function cerrarModal() {
          document.getElementById("modal-carga").style.display = "none";
          resetearFormulario();
        }

        function resetearFormulario() {
          document.getElementById("img-preview").style.display = "none";
          document.getElementById("texto-drop").style.display = "block";
          document.getElementById("status-modal").innerText = "";
          document.getElementById("file-input").value = "";
          nombreArchivoTemp = "";

          document.querySelectorAll('select').forEach((el) => {
            el.disabled = true;
            el.selectedIndex = 0;
          });
        }

        document.getElementById("file-input").addEventListener("change", function (e) {
          const archivo = e.target.files[0];
          if (archivo) {
            mostrarPrevisualizacion(archivo);
            analizarConIA(archivo);
          }
        });

        function mostrarPrevisualizacion(archivo) {
          const reader = new FileReader();
          reader.onload = function (e) {
            const img = document.getElementById("img-preview");
            img.src = e.target.result;
            img.style.display = "block";
            document.getElementById("texto-drop").style.display = "none";
          };
          reader.readAsDataURL(archivo);
        }

        async function analizarConIA(archivo) {
          const status = document.getElementById("status-modal");
          status.innerText = "⏳ IA analizando...";

          const formData = new FormData();
          formData.append("file", archivo);
          formData.append('username', SESION.nombre);

          try {
            const res = await fetch(`${API_URL}/analizar-prenda`, { method: "POST", body: formData });
            const data = await res.json();

            document.querySelectorAll('select').forEach((el) => {
              el.disabled = false;
              el.options[0].text = "Selecciona...";
            });

            document.getElementById("combo-tipo").value = data.tipo_ia;
            document.getElementById("combo-color").value = data.color_ia;
            nombreArchivoTemp = data.archivo_temp;

            status.innerText = "Análisis completo, ajusta los detalles si quieres";
            status.style.color = "green";
          } catch (err) {
            status.innerText = "⚠️ Error analizando";
          }
        }

        async function enviarGuardadoFinal() {
          const tipo = document.getElementById("combo-tipo").value;
          const color = document.getElementById("combo-color").value;
          const estilo = document.getElementById("combo-estilo").value;
          if (!nombreArchivoTemp) return lanzarError("Sube una imagen primero");

          const datos = {
            archivo: nombreArchivoTemp,
            tipo: tipo,
            color: color,
            estilo: estilo,
            user_id: SESION.id,
            username: SESION.nombre
          };
          try {
            const res = await fetch(`${API_URL}/confirmar-guardado`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(datos),
            });

            if (res.ok) {
              lanzarError("Prenda guardada correctamente");
              cerrarModal();
            } else {
              lanzarError("❌ Error guardando la prenda");
            }
          } catch (err) {
            lanzarError("🌐 Error de conexión al guardar");
          }
        }
        // El método que puedes llamar desde cualquier parte
        function lanzarError(mensaje) {
          const modal = document.getElementById("modal-dinamico");
          const texto = document.getElementById("texto-error-dinamico");

          // Insertamos el texto que llegó por argumento
          texto.innerText = mensaje;

          // Mostramos la ventana
          modal.style.display = "flex";
        }

        // Función para el botón Aceptar
        function cerrarError() {
          document.getElementById("modal-dinamico").style.display = "none";
        }
      </script>
</body>

</html>
